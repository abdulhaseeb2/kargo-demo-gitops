apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-shard
  namespace: argocd
  annotations:
    kargo.akuity.io/authorized-stage: demo:shard
spec:
  project: default
  source:
    repoURL: https://github.com/abdulhaseeb2/kargo-demo-gitops.git
    targetRevision: main
    path: k8s/shard-app
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-shard
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
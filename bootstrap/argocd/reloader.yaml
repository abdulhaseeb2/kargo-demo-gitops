apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: reloader-test-ah
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abdulhaseeb2/kargo-demo-gitops.git
    targetRevision: main
    path: k8s/reloader
  destination:
    server: https://kubernetes.default.svc
    namespace: reloader
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true